<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Taklamakan — Admin-Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css?v=9" />
</head>
<body>

  <!-- ===== Login ===== -->
  <section id="login" class="login" hidden>
    <form class="login-card" id="loginForm" novalidate>
      <div class="login-brand">Takla<span>makan</span></div>
      <p class="login-sub">Admin-Dashboard — Anmeldung</p>
      <label for="email">E-Mail</label>
      <input id="email" name="email" type="email" autocomplete="username" value="admin@lumiere.test" />
      <label for="password">Passwort</label>
      <input id="password" name="password" type="password" autocomplete="current-password" value="admin1234" />
      <p class="login-err" id="loginErr"></p>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Anmelden</button>
      <p class="login-hint">Demo: admin@lumiere.test / admin1234 · staff@lumiere.test / staff1234</p>
    </form>
  </section>

  <!-- ===== App ===== -->
  <div id="app" class="app" hidden>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="side-brand">Takla<span>makan</span></div>
      <nav class="nav">
        <button class="nav-item" data-view="day"><span class="ico">▦</span>Tagesansicht</button>
        <button class="nav-item" data-view="week"><span class="ico">▤</span>Wochenansicht</button>
        <button class="nav-item" data-view="list"><span class="ico">☰</span>Liste</button>
        <button class="nav-item" data-view="plan"><span class="ico">⌗</span>Tischplan</button>
        <button class="nav-item" data-view="stats"><span class="ico">◔</span>Statistik</button>
      </nav>
      <div class="side-foot">
        <div class="who"><span class="who-name" id="whoName">—</span><span class="who-role" id="whoRole"></span></div>
        <div class="side-actions">
          <button id="themeBtn" class="icon-btn" aria-label="Theme">◐</button>
          <button id="logoutBtn" class="icon-btn" title="Abmelden">⏻</button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <h1 id="viewTitle">Tagesansicht</h1>
        <div class="topbar-controls" id="topControls"></div>
      </header>
      <div class="content" id="content"></div>
    </main>
  </div>

  <!-- ===== Reservierungs-Detail Modal ===== -->
  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true">
      <button class="modal-x" data-close aria-label="Schließen">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="admin.js?v=9"></script>
</body>
</html>
